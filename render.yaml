services:
  - type: web
    name: watchparty-server
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false   # set to your static site URL after the frontend is deployed

  - type: web
    name: watchparty-client
    env: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false   # set to your server URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
